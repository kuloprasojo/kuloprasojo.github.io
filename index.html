<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pencarian Peserta KDKMP / KNMP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    background:#0d6efd;
    color:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:15px;
}

.header h2{
    margin-bottom:5px;
}

.developer-badge{
    background:white;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    color:#666;
}

.developer-badge a{
    color:#E4405F;
    text-decoration:none;
    font-weight:bold;
}

.developer-badge a:hover{
    text-decoration:underline;
}

.search-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

.info{
    margin-top:15px;
    color:#666;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
    color:#0d6efd;
    margin-bottom:15px;
}

.label{
    font-weight:bold;
}

.status{
    display:inline-block;
    padding:6px 15px;
    border-radius:6px;
    color:white;
    font-weight:bold;
}

.L{
    background:#198754;
}

.MS{
    background:#0d6efd;
}

.TMS{
    background:#dc3545;
}

.loading{
    text-align:center;
    font-size:18px;
    padding:30px;
}

.footer{
    text-align:center;
    color:#999;
    margin-top:30px;
    font-size:13px;
}

</style>

</head>
<body>

<div class="container">

```
<div class="header">
    <h2>Pencarian Peserta KDKMP / KNMP</h2>
    <p>Cari berdasarkan Nama atau Nomor Ujian</p>
</div>

<div class="developer-badge">
    Developed by
    <a href="https://www.instagram.com/rizkysarsyah" target="_blank">
        Rizky Sarsyah
    </a>
</div>

<div class="search-box">

    <input
        type="text"
        id="keyword"
        placeholder="Ketik Nama atau Nomor Ujian..."
    >

    <div class="info" id="info">
        Memuat data...
    </div>

</div>

<div id="result">
    <div class="loading">
        Sedang memuat data peserta...
    </div>
</div>

<div class="footer">
    © 2026 Sistem Pencarian Peserta
</div>
```

</div>

<script>

let peserta = [];

loadData();

async function loadData(){

    try{

        const response = await fetch("peserta.txt?v=1");

        if(!response.ok){
            throw new Error("File peserta.txt tidak ditemukan");
        }

        const text = await response.text();

        parseData(text);

        document.getElementById("info").innerHTML =
            "Total Peserta : " + peserta.length.toLocaleString('id-ID');

        document.getElementById("result").innerHTML =
            "<div class='card'>✅ Data berhasil dimuat. Silakan lakukan pencarian.</div>";

    }
    catch(err){

        document.getElementById("info").innerHTML =
            "❌ Gagal membaca peserta.txt";

        console.error(err);

    }

}

function parseData(text){

    peserta = [];

    const lines = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(x => x !== "");

    for(let i=0;i<lines.length;i++){

        const nomor = lines[i];

        if(/^P\d+$/i.test(nomor)){

            let nama = "";
            let jabatan = "";
            let status = "";

            if(lines[i+1]){
                nama = lines[i+1];
            }

            for(let j=i;j<i+20 && j<lines.length;j++){

                if(
                    lines[j].includes("KDKMP") ||
                    lines[j].includes("KNMP") ||
                    lines[j].includes("MANAJER")
                ){
                    jabatan = lines[j];
                    break;
                }

            }

            for(let j=i;j<i+30 && j<lines.length;j++){

                if(
                    lines[j] === "L" ||
                    lines[j] === "MS" ||
                    lines[j] === "TMS"
                ){
                    status = lines[j];
                    break;
                }

            }

            peserta.push({
                nomor,
                nama,
                jabatan,
                status
            });

        }

    }

}

document
.getElementById("keyword")
.addEventListener("keyup", cariPeserta);

function cariPeserta(){

    const key =
        this.value.trim().toUpperCase();

    if(key.length < 2){

        document.getElementById("result").innerHTML = "";

        return;

    }

    const hasil = peserta.filter(item =>

        item.nama.toUpperCase().includes(key) ||
        item.nomor.toUpperCase().includes(key)

    );

    tampilkan(hasil.slice(0,100));

}

function tampilkan(data){

    let html = "";

    if(data.length === 0){

        html =
        `<div class="card">
            Data tidak ditemukan.
        </div>`;

        document.getElementById("result").innerHTML =
            html;

        return;

    }

    data.forEach(item => {

        html += `

        <div class="card">

            <h3>${item.nama}</h3>

            <p>
                <span class="label">Nomor Ujian :</span>
                ${item.nomor}
            </p>

            <br>

            <p>
                <span class="label">Jabatan :</span>
                ${item.jabatan || "-"}
            </p>

            <br>

            <p>
                <span class="label">Status :</span>

                <span class="status ${item.status}">
                    ${item.status || "-"}
                </span>
            </p>

        </div>

        `;

    });

    document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
